<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 08 · Processamento condicional · PDS I · DCC/UFMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .slide-enter { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col">
    <a href="../index.html" class="fixed top-3 left-3 z-50 text-sm text-slate-400 hover:text-white bg-slate-900/90 px-3 py-1.5 rounded-lg border border-slate-700 transition-colors no-underline">← Exercícios PDS I</a>

    <!-- Área do Slide -->
    <main class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div id="slide-container" class="w-full max-w-5xl aspect-video bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 overflow-hidden relative slide-enter">
            <!-- Conteúdo injetado via JS -->
        </div>
    </main>

    <!-- Barra de Navegação -->
    <footer class="bg-slate-900/80 backdrop-blur-md border-t border-slate-800 p-6 flex items-center justify-between">
        <div class="text-slate-400 text-sm font-medium">
            Slide <span id="current-index" class="text-white">1</span> de <span id="total-slides">0</span>
        </div>
        
        <div class="flex space-x-4">
            <button id="prev-btn" class="flex items-center px-4 py-2 rounded-xl bg-slate-800 text-white disabled:opacity-30 hover:bg-slate-700 transition-all active:scale-95">
                ← Anterior
            </button>
            <button id="next-btn" class="flex items-center px-6 py-2 rounded-xl bg-blue-600 text-white disabled:opacity-30 hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                Próximo →
            </button>
        </div>

        <div class="hidden md:block">
            <span class="text-slate-500 font-bold tracking-tighter text-xl">DCC | UFMG</span>
        </div>
    </footer>

    <script>
        const slides = [
            {
                type: 'cover',
                title: 'Processamento Condicional',
                subtitle: 'Exercícios de Fixação - PDS I',
                author: 'Prof. Paulo Rezeck',
                semester: '2026/01'
            },
            // Problema 1: UFMG Nota/Freq
            {
                type: 'problem',
                id: 1,
                title: '1. Critério de Aprovação UFMG',
                context: 'No regulamento da UFMG, um aluno é aprovado se atingir a nota mínima e a frequência mínima exigida.',
                problem: 'Escreva um programa que leia a nota final (0 a 100) e a frequência (0 a 100%) de um aluno. Imprima "Aprovado" se a nota for ≥ 60 E a frequência for ≥ 75. Caso contrário, imprima "Reprovado".',
                icon: '🎓'
            },
            {
                type: 'solution',
                id: 1,
                title: 'Solução: Operadores Lógicos',
                code: `#include <stdio.h>

int main() {
    float nota, freq;
    printf("Digite a nota (0-100) e frequencia (0-100): ");
    scanf("%f %f", &nota, &freq);

    if (nota >= 60.0 && freq >= 75.0) {
        printf("Resultado: Aprovado\\n");
    } else {
        printf("Resultado: Reprovado\\n");
    }
    return 0;
}`,
                output: '> Nota: 70, Freq: 80 -> Aprovado\n> Nota: 55, Freq: 90 -> Reprovado'
            },
            // Problema 2: Pagamentos
            {
                type: 'problem',
                id: 2,
                title: '2. Check-out de E-commerce',
                context: 'Sistemas de vendas online oferecem incentivos dependendo da forma de pagamento escolhida pelo cliente.',
                problem: 'Leia o valor de uma compra e o método de pagamento (1: PIX, 2: Boleto, 3: Cartão). \n- PIX: 10% de desconto.\n- Boleto: 5% de desconto.\n- Cartão: Valor integral.\nImprima o valor final a pagar.',
                icon: '💰'
            },
            {
                type: 'solution',
                id: 2,
                title: 'Solução: Condicionais Encadeadas',
                code: `#include <stdio.h>

int main() {
    float valor;
    int opcao;
    printf("Valor da compra e opcao (1:PIX, 2:Boleto, 3:Cartao): ");
    scanf("%f %d", &valor, &opcao);

    if (opcao == 1) {
        valor *= 0.90; // 10% off
    } else if (opcao == 2) {
        valor *= 0.95; // 5% off
    }

    printf("Total a pagar: R$ %.2f\\n", valor);
    return 0;
}`,
                output: '> Valor: 100.00, Opcao: 1 -> Total: R$ 90.00\n> Valor: 200.00, Opcao: 3 -> Total: R$ 200.00'
            },
            // Problema 3: Calculadora Switch
            {
                type: 'problem',
                id: 3,
                title: '3. Calculadora Aritmética',
                context: 'Ferramentas de cálculo precisam processar diferentes operações baseadas em um símbolo fornecido pelo usuário.',
                problem: 'Desenvolva uma calculadora que leia dois números reais e um caractere representando a operação (+, -, *, /). Use a estrutura switch-case para realizar o cálculo e exibir o resultado.',
                icon: '🧮'
            },
            {
                type: 'solution',
                id: 3,
                title: 'Solução: Estrutura Switch-Case',
                code: `#include <stdio.h>

int main() {
    float n1, n2;
    char op;
    printf("Digite: numero1 operador numero2 (ex: 5 + 3): ");
    scanf("%f %c %f", &n1, &op, &n2);

    switch(op) {
        case '+': printf("Soma: %.2f\\n", n1 + n2); break;
        case '-': printf("Subtracao: %.2f\\n", n1 - n2); break;
        case '*': printf("Multiplicacao: %.2f\\n", n1 * n2); break;
        case '/': 
            if(n2 != 0) printf("Divisao: %.2f\\n", n1 / n2);
            else printf("Erro: Divisao por zero!\\n");
            break;
        default: printf("Operador invalido!\\n");
    }
    return 0;
}`,
                output: '> 10 / 2 -> Divisao: 5.00\n> 7 * 3 -> Multiplicacao: 21.00'
            },
            {
                type: 'cover',
                title: 'Fim da Aula',
                subtitle: 'Dúvidas? Pratiquem os exercícios no Moodle.',
                author: 'Bons estudos!',
                semester: 'PDS I - UFMG'
            }
        ];

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        let currentIndex = 0;
        const container = document.getElementById('slide-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currIdxSpan = document.getElementById('current-index');
        const totalSlidesSpan = document.getElementById('total-slides');

        function renderSlide() {
            const slide = slides[currentIndex];
            let html = '';

            container.classList.remove('slide-enter');
            void container.offsetWidth; 
            container.classList.add('slide-enter');

            if (slide.type === 'cover') {
                html = `
                    <div class="flex flex-col items-center justify-center h-full text-center p-8 space-y-6">
                        <div class="bg-blue-600/20 p-8 rounded-full text-6xl">💻</div>
                        <h1 class="text-5xl font-bold text-white tracking-tight">${slide.title}</h1>
                        <p class="text-2xl text-blue-400">${slide.subtitle}</p>
                        <div class="pt-12 border-t border-slate-700 w-1/2">
                            <p class="text-slate-400 uppercase tracking-widest text-sm">DCC - UFMG | ${slide.semester}</p>
                            <p class="text-slate-200 text-lg font-semibold">${slide.author}</p>
                        </div>
                    </div>
                `;
            } else if (slide.type === 'problem') {
                html = `
                    <div class="flex flex-col h-full p-10 space-y-6">
                        <div class="flex items-center space-x-4 border-b border-slate-700 pb-4">
                            <div class="p-3 bg-slate-800 rounded-lg text-3xl">${slide.icon}</div>
                            <h2 class="text-3xl font-bold text-white">${slide.title}</h2>
                        </div>
                        <div class="flex-1 space-y-6 overflow-auto">
                            <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                                <h3 class="text-blue-400 font-bold text-xs uppercase mb-2 tracking-widest">Contexto</h3>
                                <p class="text-slate-200 text-lg">${slide.context}</p>
                            </div>
                            <div class="bg-blue-900/20 p-6 rounded-xl border border-blue-500/30">
                                <h3 class="text-blue-400 font-bold text-xs uppercase mb-2 tracking-widest">Problema</h3>
                                <p class="text-white text-xl font-medium leading-relaxed">${slide.problem.replace(/\n/g, '<br>')}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (slide.type === 'solution') {
                html = `
                    <div class="flex flex-col h-full p-10 space-y-4">
                        <div class="flex items-center space-x-4 border-b border-slate-700 pb-4">
                            <div class="p-3 bg-green-900/30 rounded-lg text-2xl">✅</div>
                            <h2 class="text-3xl font-bold text-white">${slide.title}</h2>
                        </div>
                        <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 overflow-hidden">
                            <div class="md:col-span-2 flex flex-col rounded-xl border border-slate-700 bg-[#1e1e1e] overflow-hidden">
                                <div class="px-4 py-2 bg-slate-800 text-xs text-slate-400 font-mono flex justify-between">
                                    <span>exercicio.c</span>
                                    <span>UTF-8</span>
                                </div>
                                <pre class="p-4 text-sm code-font text-slate-300 overflow-auto flex-1"><code>${escapeHtml(slide.code)}</code></pre>
                            </div>
                            <div class="bg-slate-950 rounded-xl border border-slate-800 p-4 flex flex-col">
                                <h3 class="text-green-500 font-bold text-xs uppercase mb-3 tracking-widest">Exemplo de Saída</h3>
                                <pre class="text-xs code-font text-green-400 leading-relaxed whitespace-pre-wrap">${slide.output}</pre>
                                <div class="mt-auto pt-4 border-t border-slate-800">
                                    <p class="text-[10px] text-slate-500 uppercase">Dica: Teste sempre os valores de borda (ex: nota 60).</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            currIdxSpan.innerText = currentIndex + 1;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === slides.length - 1;
        }

        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderSlide(); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < slides.length - 1) { currentIndex++; renderSlide(); } });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextBtn.click();
            if (e.key === 'ArrowLeft') prevBtn.click();
        });

        totalSlidesSpan.innerText = slides.length;
        renderSlide();
    </script>
</body>
</html>
